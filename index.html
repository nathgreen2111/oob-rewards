<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1B1D36">
<title>Out of Bounds Rewards</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="logos/outofbounds-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Paytone+One&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  /* brand palette pulled from your logos */
  --navy:#1B1D36;
  --navy-2:#252845;
  --navy-card:#20233f;
  --pink:#E64362;
  --pink-deep:#CF3C56;
  --teal:#43C4B2;
  --teal-deep:#35a99a;
  --yellow:#FFD23F;
  --yellow-deep:#f5c518;
  --ink:#0e0f1d;
  --paper:#f7f7fb;
  --muted:#9aa0c0;
  --line:rgba(255,255,255,.08);
  --ok:#3ecf8e;
  --warn:#ff6b6b;
  --r:18px;
  --display:'Paytone One',system-ui,sans-serif;
  --body:'Inter',system-ui,sans-serif;
  /* active brand accent — swapped per screen */
  --accent:var(--pink);
  --accent-deep:var(--pink-deep);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--body);
  background:
    radial-gradient(1200px 600px at 50% -10%, rgba(230,67,98,.18), transparent 60%),
    radial-gradient(900px 500px at 100% 110%, rgba(67,196,178,.12), transparent 55%),
    var(--navy);
  color:#fff;min-height:100vh;min-height:100dvh;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:460px;margin:0 auto;padding:18px 18px 40px}
h1,h2,h3{font-family:var(--display);font-weight:400;letter-spacing:.2px;margin:0}
.muted{color:var(--muted)}
.small{font-size:13px}
.center{text-align:center}

/* ---------- top bar ---------- */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 2px 22px}
.brandmark{display:flex;align-items:center;gap:10px}
.brandmark img{height:34px;width:auto;display:block}
.brandmark .bn{font-family:var(--display);font-size:15px;line-height:1;letter-spacing:.3px}
.brandmark .bn small{display:block;font-family:var(--body);font-weight:600;font-size:9.5px;letter-spacing:3px;color:var(--muted);margin-top:3px}
.linkbtn{background:none;border:none;color:var(--muted);font-family:var(--body);font-weight:600;font-size:13px;cursor:pointer;padding:8px}
.linkbtn:hover{color:#fff}

/* ---------- cards ---------- */
.card{background:linear-gradient(180deg,var(--navy-card),var(--navy-2));border:1px solid var(--line);border-radius:var(--r);padding:22px;box-shadow:0 18px 50px -22px rgba(0,0,0,.7)}
.card+.card{margin-top:16px}

/* ---------- inputs ---------- */
label.fl{display:block;font-size:12px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);margin:0 0 7px 2px}
input,select{
  width:100%;padding:14px 15px;border-radius:13px;border:1px solid var(--line);
  background:#171933;color:#fff;font-family:var(--body);font-size:16px;font-weight:500;outline:none;transition:border-color .15s,box-shadow .15s;
}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 25%,transparent)}
.field+.field{margin-top:14px}

/* ---------- buttons (brand rule: yellow w/ white text + animation) ---------- */
.btn{
  --b:var(--yellow);--bd:var(--yellow-deep);
  width:100%;border:none;cursor:pointer;color:#fff;font-family:var(--body);font-weight:800;
  font-size:16px;letter-spacing:.3px;padding:16px;border-radius:14px;
  background:linear-gradient(180deg,var(--b),var(--bd));
  box-shadow:0 8px 0 -2px color-mix(in srgb,var(--bd) 70%,#000), 0 16px 30px -12px rgba(0,0,0,.6);
  transform:translateY(0);transition:transform .12s cubic-bezier(.34,1.56,.64,1),box-shadow .12s,filter .12s;
  text-shadow:0 1px 0 rgba(0,0,0,.25);
}
.btn:hover{filter:brightness(1.05);transform:translateY(-2px);box-shadow:0 11px 0 -2px color-mix(in srgb,var(--bd) 70%,#000),0 20px 36px -12px rgba(0,0,0,.6)}
.btn:active{transform:translateY(3px);box-shadow:0 4px 0 -2px color-mix(in srgb,var(--bd) 70%,#000),0 10px 18px -10px rgba(0,0,0,.6)}
.btn[disabled]{opacity:.5;cursor:not-allowed;transform:none;box-shadow:0 6px 0 -2px color-mix(in srgb,var(--bd) 70%,#000)}
.btn.ghost{--b:transparent;--bd:transparent;background:transparent;border:1.5px solid var(--line);box-shadow:none;color:#fff;font-weight:700}
.btn.ghost:hover{border-color:var(--accent);transform:translateY(-1px)}
.btn.accent{--b:var(--accent);--bd:var(--accent-deep)}
.btn+.btn{margin-top:11px}
.btnrow{display:flex;gap:11px}.btnrow .btn{margin-top:0}

/* ---------- stamp card ---------- */
.loyalty{position:relative;overflow:hidden;border-radius:22px;padding:24px 22px 22px;
  background:linear-gradient(135deg,var(--pink) 0%,var(--pink-deep) 55%,#a82f46 100%);
  border:1px solid rgba(255,255,255,.14);box-shadow:0 22px 55px -20px rgba(230,67,98,.55)}
.loyalty::after{content:"";position:absolute;inset:0;background:radial-gradient(420px 200px at 115% -20%,rgba(255,255,255,.25),transparent 60%);pointer-events:none}
.loyalty .lh{display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:1}
.loyalty .lt{font-family:var(--display);font-size:20px;line-height:1.05}
.loyalty .ls{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;opacity:.85;margin-top:6px}
.loyalty .obi{height:26px;opacity:.92}
.stamps{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin:22px 0 4px;position:relative;z-index:1}
.stamp{aspect-ratio:1;border-radius:50%;border:2px dashed rgba(255,255,255,.45);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:14px;color:rgba(255,255,255,.55);background:rgba(255,255,255,.05);transition:all .2s}
.stamp.on{border:2px solid #fff;background:radial-gradient(circle at 35% 30%,#ffffff,#ffe9ee 70%);color:var(--pink-deep);box-shadow:0 6px 16px -5px rgba(0,0,0,.45),inset 0 -2px 6px rgba(230,67,98,.25);animation:pop .42s cubic-bezier(.34,1.56,.64,1);font-size:18px}
@keyframes pop{0%{transform:scale(.2) rotate(-25deg);opacity:0}60%{transform:scale(1.15) rotate(6deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.lprog{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:center;margin-top:14px;font-size:13px;font-weight:600}
.reward-pill{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.25);padding:6px 12px;border-radius:999px;font-weight:700;font-size:12px;letter-spacing:.3px}

/* ---------- QR ---------- */
.qrbox{display:flex;flex-direction:column;align-items:center;gap:14px}
.qrcanvas{background:#fff;border-radius:16px;padding:14px;line-height:0;box-shadow:0 10px 30px -12px rgba(0,0,0,.6)}
.refchip{font-family:var(--display);font-size:24px;letter-spacing:2px;background:#171933;border:1px solid var(--line);padding:10px 18px;border-radius:12px}

/* ---------- ready banner ---------- */
.ready{background:linear-gradient(180deg,var(--teal),var(--teal-deep));color:#06231f;border-radius:16px;padding:18px;text-align:center;animation:glow 2.2s ease-in-out infinite}
.ready h3{font-size:22px;color:#06231f}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(67,196,178,.45)}50%{box-shadow:0 0 0 14px rgba(67,196,178,0)}}
@keyframes flashIn{from{opacity:0;transform:scale(1.1)}to{opacity:1;transform:scale(1)}}
@keyframes flashOut{to{opacity:0}}
@keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ---------- site picker ---------- */
.sitegrid{display:grid;gap:11px;margin-top:6px}
.sitebtn{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:15px;border:1.5px solid var(--line);background:#171933;cursor:pointer;transition:border-color .15s,transform .12s,background .15s;color:#fff;text-align:left;width:100%;font-family:var(--body)}
.sitebtn:hover{transform:translateY(-2px)}
.sitebtn.sel{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 14%,#171933)}
.sitebtn .dot{width:46px;height:46px;border-radius:12px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:18px;overflow:hidden}
.sitebtn .dot img{width:100%;height:100%;object-fit:contain;padding:7px}
.sitebtn .sn{font-weight:700;font-size:15px}
.sitebtn .sd{font-size:12px;color:var(--muted)}

/* ---------- misc ---------- */
.divider{height:1px;background:var(--line);margin:20px 0}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(120px);background:var(--ink);border:1px solid var(--line);color:#fff;padding:13px 20px;border-radius:13px;font-weight:600;font-size:14px;z-index:99;transition:transform .35s cubic-bezier(.34,1.56,.64,1);box-shadow:0 14px 40px -14px #000;max-width:90vw}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{border-color:var(--warn)}
.toast.ok{border-color:var(--ok)}
.tabbar{display:flex;background:#171933;border:1px solid var(--line);border-radius:14px;padding:5px;margin-bottom:18px}
.tabbar button{flex:1;border:none;background:none;color:var(--muted);font-family:var(--body);font-weight:700;font-size:13px;padding:11px;border-radius:10px;cursor:pointer}
.tabbar button.active{background:var(--navy-2);color:#fff}
.hide{display:none!important}
.welcome-code{background:#171933;border:1px dashed var(--teal);border-radius:13px;padding:14px;text-align:center;margin-top:14px}
.welcome-code b{font-family:var(--display);font-size:20px;color:var(--teal);letter-spacing:2px;display:block;margin-top:4px}
.spin{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px}
@keyframes sp{to{transform:rotate(360deg)}}
.histrow{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);font-size:14px}
.histrow:last-child{border:none}
.histrow .hsite{font-weight:600}.histrow .hdate{color:var(--muted);font-size:12px}
.tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;letter-spacing:.3px}
.tag.s{background:color-mix(in srgb,var(--teal) 22%,transparent);color:var(--teal)}
.tag.r{background:color-mix(in srgb,var(--yellow) 22%,transparent);color:var(--yellow)}
.bignum{font-family:var(--display);font-size:46px;line-height:1}
.errmsg{background:color-mix(in srgb,var(--warn) 16%,transparent);border:1px solid var(--warn);color:#ffd1d1;padding:12px 14px;border-radius:12px;font-size:13.5px;font-weight:600;margin-top:14px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.foot{text-align:center;color:var(--muted);font-size:11px;margin-top:26px;letter-spacing:.3px}
/* ---- Where to collect (venues) ---- */
.venues-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.venue-list{position:relative;display:flex;flex-direction:column;gap:12px}
/* signature: a dotted trail threading the three collection points */
.venue-list::before{content:"";position:absolute;left:40px;top:30px;bottom:30px;width:2px;
  background:repeating-linear-gradient(var(--muted) 0 3px,transparent 3px 9px);opacity:.35;z-index:0}
.venue{position:relative;z-index:1;display:flex;align-items:center;gap:14px;padding:13px 14px;
  background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));
  border:1px solid var(--line);border-radius:15px;
  transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease}
.venue:hover{transform:translateY(-2px);
  border-color:color-mix(in srgb,var(--vc) 55%,transparent);
  box-shadow:0 10px 26px -14px var(--vc)}
.venue-logo{flex:0 0 auto;width:48px;height:48px;border-radius:13px;
  background:radial-gradient(circle at 30% 25%,color-mix(in srgb,var(--vc) 38%,#171933),#171933);
  border:1px solid color-mix(in srgb,var(--vc) 50%,transparent);
  box-shadow:0 0 0 4px color-mix(in srgb,var(--vc) 12%,transparent);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  font-family:var(--display);font-size:19px;color:#fff}
.venue-logo img{width:100%;height:100%;object-fit:contain;padding:9px}
.venue-logo.noimg{padding:0}
.venue-body{flex:1;min-width:0}
.venue-name{font-family:var(--display);font-size:15px;line-height:1.15;letter-spacing:.2px}
.venue-addr{color:var(--muted);font-size:12px;line-height:1.5;margin-top:3px}
.venue-tag{flex:0 0 auto;font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
  color:var(--vc);background:color-mix(in srgb,var(--vc) 14%,transparent);
  border:1px solid color-mix(in srgb,var(--vc) 35%,transparent);
  padding:5px 9px;border-radius:8px;white-space:nowrap}
.staffwrap{}
.staffwrap .card{border-color:rgba(67,196,178,.25)}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="center" style="padding-top:80px"><span class="spin"></span></div>
</div>
<div class="toast" id="toast"></div>

<!-- libs -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="qrcode.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="/api/config"></script>
<script>
/* ============================================================
   OUT OF BOUNDS REWARDS — app logic
   ============================================================ */
const CONSENT_VERSION = '2026-06-26';  // bump if Terms/Privacy change
const SITES = {
  levelup:   {name:'LevelUp Escapes', short:'Escape rooms · Shrewsbury', accent:'#E64362', deep:'#CF3C56', tag:'L', logo:'logos/levelup.png',
              email:'help@levelupescapes.com',     address:'Unit SU33, Darwin Centre, Shrewsbury SY1 1BW'},
  axefactor: {name:'The Axe Factor',  short:'Axe throwing · Shrewsbury', accent:'#43C4B2', deep:'#35a99a', tag:'A', logo:'logos/axefactor.png',
              email:'axeperts@theaxefactor.co.uk', address:'Unit SU33, Darwin Centre, Shrewsbury SY1 1BW'},
  xscapenow: {name:'XscapeNow',       short:'Immersive · Telford',       accent:'#E64362', deep:'#CF3C56', tag:'X', logo:'logos/xscapenow.png',
              email:'info@xscapenow.co.uk',        address:'Units 17–19, Ketley Business Park, Telford TF1 5JD'},
};
const GOAL = 6;

let sb = null;
function initSupabase(){
  const c = window.OOB_CONFIG||{};
  if(!c.SUPABASE_URL || c.SUPABASE_URL.includes('YOUR-PROJECT')){ return false; }
  sb = window.supabase.createClient(c.SUPABASE_URL, c.SUPABASE_ANON_KEY);
  return true;
}

const app = document.getElementById('app');
const $ = (s,r=document)=>r.querySelector(s);

function toast(msg,type=''){
  const t=$('#toast'); t.textContent=msg; t.className='toast show '+type;
  clearTimeout(t._t); t._t=setTimeout(()=>t.className='toast',2600);
}
function setAccent(site){
  const a = site? SITES[site].accent : '#E64362';
  const d = site? SITES[site].deep   : '#CF3C56';
  document.documentElement.style.setProperty('--accent',a);
  document.documentElement.style.setProperty('--accent-deep',d);
}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function fmtDate(d){return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}

/* ---------- Staff feedback: sound, haptics, flash ---------- */
let SOUND_STYLE = (typeof localStorage!=='undefined' && localStorage.getItem) ? null : null; // chosen at runtime
let _audioCtx=null;
function audioCtx(){ if(!_audioCtx){ try{ _audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return _audioCtx; }
function tone(freq,start,dur,type='sine',gain=0.18){
  const ctx=audioCtx(); if(!ctx) return;
  const o=ctx.createOscillator(), g=ctx.createGain();
  o.type=type; o.frequency.value=freq;
  o.connect(g); g.connect(ctx.destination);
  const t=ctx.currentTime+start;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(gain,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t); o.stop(t+dur+0.02);
}
// three success styles
function soundDing(){ tone(880,0,0.12,'sine',0.2); tone(1320,0.08,0.18,'sine',0.16); }
function soundPop(){ tone(523,0,0.07,'triangle',0.18); tone(784,0.05,0.12,'triangle',0.16); }
function soundArcade(){ tone(523,0,0.06,'square',0.12); tone(659,0.06,0.06,'square',0.12); tone(784,0.12,0.06,'square',0.12); tone(1047,0.18,0.16,'square',0.14); }
function playSuccess(){ const s=getSoundStyle(); if(s==='off')return; (s==='pop'?soundPop:s==='arcade'?soundArcade:soundDing)(); }
function playFail(){ if(getSoundStyle()==='off')return; tone(200,0,0.18,'sawtooth',0.15); tone(150,0.12,0.22,'sawtooth',0.13); }
function playCelebrate(){ if(getSoundStyle()==='off')return; [523,659,784,1047,1319].forEach((f,i)=>tone(f,i*0.09,0.25,'triangle',0.16)); }
function getSoundStyle(){ try{ return localStorage.getItem('oob_sound')||'ding'; }catch(e){ return 'ding'; } }
function setSoundStyle(s){ try{ localStorage.setItem('oob_sound',s); }catch(e){} }
function buzz(ms){ try{ if(navigator.vibrate) navigator.vibrate(ms); }catch(e){} }
// full-screen flash overlay
function flash(kind,label){
  const c = kind==='ok' ? '#3ecf8e' : kind==='reward' ? '#43C4B2' : '#ff6b6b';
  const el=document.createElement('div');
  el.style.cssText=`position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:${c};color:#06231f;font-family:var(--display);text-align:center;animation:flashIn .25s ease,flashOut .4s ease 1s forwards;`;
  el.innerHTML=`<div style="font-size:64px;line-height:1">${kind==='ok'?'★':kind==='reward'?'🎉':'✕'}</div><div style="font-size:26px;margin-top:14px;padding:0 24px">${esc(label)}</div>`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1450);
}
function confetti(){
  const colors=['#E64362','#43C4B2','#FFD23F','#fff'];
  const wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;inset:0;z-index:10000;pointer-events:none;overflow:hidden';
  for(let i=0;i<80;i++){
    const p=document.createElement('div');
    const size=6+Math.random()*8;
    p.style.cssText=`position:absolute;top:-20px;left:${Math.random()*100}%;width:${size}px;height:${size*0.5}px;background:${colors[i%colors.length]};border-radius:2px;transform:rotate(${Math.random()*360}deg);animation:confettiFall ${1.2+Math.random()*1.3}s ${Math.random()*0.4}s ease-in forwards`;
    wrap.appendChild(p);
  }
  document.body.appendChild(wrap);
  setTimeout(()=>wrap.remove(),3200);
}


// Render Apple + Google Wallet buttons in-app (no redirect away). Mints the pass
// via the Edge Function on first tap, then shows both native add buttons in place.
function walletButtonsHtml(appleUrl, googleUrl){
  const isApple = /iPhone|iPad|iPod|Macintosh/.test(navigator.userAgent);
  const apple = appleUrl ? `<a href="${appleUrl}" class="btn" style="--b:#000;--bd:#000;display:block;text-align:center;text-decoration:none;margin-top:8px">  Add to Apple Wallet</a>` : '';
  const google = googleUrl ? `<a href="${googleUrl}" target="_blank" class="btn ghost" style="display:block;text-align:center;text-decoration:none;margin-top:8px">  Save to Google Wallet</a>` : '';
  // show the likely-relevant one first
  return isApple ? apple + google : google + apple;
}
async function renderWalletButton(cust){
  const box=$('#walletbtn'); if(!box) return;
  // already minted? show both buttons straight away
  if(cust.pass_apple_url || cust.pass_google_url || cust.pass_share_url){
    box.innerHTML = walletButtonsHtml(cust.pass_apple_url, cust.pass_google_url)
      || `<a href="${cust.pass_share_url}" target="_blank" class="btn accent" style="display:block;text-align:center;text-decoration:none;margin-top:8px">📲 Add to Apple / Google Wallet</a>`;
    return;
  }
  box.innerHTML=`<button class="btn accent" id="mkwallet" style="margin-top:8px">📲 Add to Apple / Google Wallet</button>`;
  $('#mkwallet').onclick=async()=>{
    const b=$('#mkwallet'); b.disabled=true; b.innerHTML='<span class="spin"></span>';
    try{
      const {data,error}=await sb.functions.invoke('wallet-pass',{body:{action:'create',ref:cust.ref}});
      if(error||!data) throw new Error('failed');
      const html=walletButtonsHtml(data.appleUrl, data.googleSaveUrl);
      box.innerHTML = html || `<a href="${data.shareUrl}" target="_blank" class="btn accent" style="display:block;text-align:center;text-decoration:none;margin-top:8px">📲 Open in Apple / Google Wallet</a>`;
    }catch(e){
      b.disabled=false; b.textContent='📲 Add to Apple / Google Wallet';
      toast('Could not create your wallet pass just now.','err');
    }
  };
}

// Draw a scannable QR (just the ref) onto a canvas using the embedded encoder.
// Falls back to showing the ref large if anything goes wrong.
function renderQR(canvas, text){
  try{
    if(typeof qrcode!=='function') throw new Error('no encoder');
    var model=null;
    for(var t=2;t<=8;t++){ try{ model=qrcode(t,'M'); model.addData(text); model.make(); break; }catch(e){ model=null; } }
    if(!model) throw new Error('encode failed');
    var n=model.getModuleCount(), border=2, target=188;
    var size=Math.max(2, Math.floor(target/(n+border*2)));
    var dim=(n+border*2)*size;
    canvas.width=dim; canvas.height=dim;
    var ctx=canvas.getContext('2d');
    ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,dim,dim);
    ctx.fillStyle='#1B1D36';
    for(var r=0;r<n;r++) for(var c=0;c<n;c++){ if(model.isDark(r,c)){ ctx.fillRect((c+border)*size,(r+border)*size,size,size); } }
  }catch(err){
    // visible fallback: the ref is enough for staff to type in manually
    var wrap=canvas.parentNode;
    if(wrap){ wrap.innerHTML='<div style="padding:24px 18px;text-align:center;font-family:var(--display);font-size:22px;color:#1B1D36;letter-spacing:2px">'+esc(text)+'</div>'; }
  }
}

async function doLogin(){

async function doSignup(){
  const name=$('#nm').value.trim(), email=$('#em').value.trim(), pw=$('#pw').value;

  if(error){ btn.disabled=false; btn.textContent='Create my card'; return authErr(error.message); }

    return `<div class="histrow" style="opacity:${s.active?1:.5}">
      <div><div class="hsite">${esc(s.name)} ${s.active?'':'<span class="small muted">(inactive)</span>'}</div>
        <div class="hdate">${roleTag} · ${esc(siteName)}</div></div>
      <div style="display:flex;gap:6px">
        <button class="btn ghost" style="padding:6px 10px;font-size:12px" data-pin="${s.id}">PIN</button>
        <button class="btn ghost" style="padding:6px 10px;font-size:12px;${s.active?'border-color:var(--warn);color:#ffd1d1':''}" data-act="${s.id}" data-to="${s.active?'0':'1'}">${s.active?'Deactivate':'Reactivate'}</button>
      </div></div>`;
  }).join('');
  box.querySelectorAll('[data-act]').forEach(b=>b.onclick=()=>staffMgrSetActive(b.dataset.act,b.dataset.to==='1'));
  box.querySelectorAll('[data-pin]').forEach(b=>b.onclick=()=>staffMgrResetPin(b.dataset.pin));
}

async function staffMgrAdd(){
  const name=$('#ms_name').value.trim(), pin=$('#ms_pin').value.trim(),
        role=$('#ms_role').value, site=$('#ms_site').value||null;
  const err=$('#ms_err');
  if(!name) return err.innerHTML=`<div class="errmsg">Enter a name.</div>`;
  if(!/^[0-9]{6}$/.test(pin)) return err.innerHTML=`<div class="errmsg">PIN must be exactly 6 digits.</div>`;
  const btn=$('#ms_add'); btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
  const {data,error}=await sb.rpc('staff_add',{p_manager_pin:STAFF.pin,p_name:name,p_pin:pin,p_role:role,p_site:site});
  btn.disabled=false; btn.textContent='Add team member';
  if(error||!data?.ok){ err.innerHTML=`<div class="errmsg">${esc(staffMgrErr(error?.message))}</div>`; return; }
  $('#ms_name').value=''; $('#ms_pin').value=''; err.innerHTML='';
  loadStaffList();
}

async function staffMgrSetActive(id, makeActive){
  if(!makeActive && !confirm('Deactivate this person? Their PIN will stop working immediately.')) return;
  const {data,error}=await sb.rpc('staff_set_active',{p_manager_pin:STAFF.pin,p_staff_id:id,p_active:makeActive});
  if(error||!data?.ok){ alert(staffMgrErr(error?.message)); return; }
  loadStaffList();
}

async function staffMgrResetPin(id){
  const newpin=prompt('New 6-digit PIN for this person:');
  if(newpin===null) return;
  if(!/^[0-9]{6}$/.test(newpin.trim())){ alert('PIN must be exactly 6 digits.'); return; }
  const {data,error}=await sb.rpc('staff_set_pin',{p_manager_pin:STAFF.pin,p_staff_id:id,p_new_pin:newpin.trim()});
  if(error||!data?.ok){ alert(staffMgrErr(error?.message)); return; }
  alert('PIN updated.');
}

function staffMgrErr(m){
  m=m||'';
  if(/PIN_TAKEN/.test(m)) return 'That PIN is already in use — pick another.';
  if(/PIN_FORMAT/.test(m)) return 'PIN must be exactly 6 digits.';
  if(/LAST_MANAGER/.test(m)) return "You can't deactivate the last manager.";
  if(/NOT_MANAGER/.test(m)) return 'Manager access required.';
  if(/BAD_SITE|BAD_ROLE/.test(m)) return 'Invalid role or site.';
  return 'Something went wrong. Try again.';
}

async function loadRecent(){
  const box=$('#recent'); if(!box) return;
  const {data,error}=await sb.rpc('staff_recent',{p_pin:STAFF.pin,p_limit:8});
  if(error||!data||!data.length){ box.innerHTML=`<p class="muted small" style="margin:6px 0">No activity yet today.</p>`; return; }
  box.innerHTML=data.map(e=>{
    const s=SITES[e.site]||{name:e.site}; const redeem=e.kind==='redeem';
    const t=new Date(e.created_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    return `<div class="histrow">
      <div><div class="hsite">${esc(e.ref)} · ${esc(s.name)}</div><div class="hdate">${t}${e.staff_name?(' · '+esc(e.staff_name)):''}</div></div>
      <span class="tag ${redeem?'r':'s'}">${redeem?'−£25':'+1'}</span>
    </div>`;}).join('');
}

async function renderStaffToday(){
  app.innerHTML = `<div class="staffwrap">` + topBar(`<button class="linkbtn" id="back">← Back</button>`) + `
  <div class="card"><h2 style="font-size:22px;margin-bottom:4px">Today</h2>
  <p class="small muted" style="margin-bottom:14px">Since midnight, across all sites</p>
  <div id="sum"><div class="center" style="padding:14px"><span class="spin"></span></div></div></div></div>`;
  $('#back').onclick=renderStaffHome;
  const {data,error}=await sb.rpc('staff_today',{p_pin:STAFF.pin});
  const box=$('#sum');
  if(error||!data||!data.length){ box.innerHTML=`<p class="muted small">No activity yet today.</p>`; return; }
  let totS=0,totR=0; data.forEach(r=>{totS+=Number(r.stamps_added);totR+=Number(r.redemptions);});
  box.innerHTML=`
    <div class="btnrow" style="margin-bottom:16px">
      <div class="card" style="flex:1;text-align:center;padding:16px"><div class="bignum" style="font-size:34px">${totS}</div><div class="small muted">stamps added</div></div>
      <div class="card" style="flex:1;text-align:center;padding:16px"><div class="bignum" style="font-size:34px;color:var(--yellow)">${totR}</div><div class="small muted">£25 redemptions</div></div>
    </div>
    <h3 style="font-size:15px;margin-bottom:8px">By team member</h3>
    ${data.map(r=>{const s=SITES[r.site]||{name:r.site};return `<div class="histrow">
      <div><div class="hsite">${esc(r.staff_name)}</div><div class="hdate">${esc(s.name)}</div></div>
      <span class="small">${r.stamps_added} stamps${Number(r.redemptions)?(' · '+r.redemptions+' redeemed'):''}</span>
    </div>`;}).join('')}`;
}

function renderSoundSetting(){
  const cur=getSoundStyle();
  app.innerHTML = `<div class="staffwrap">` + topBar(`<button class="linkbtn" id="back">← Back</button>`) + `
  <div class="card"><h2 style="font-size:22px;margin-bottom:14px">Scan sound</h2>
  <div class="sitegrid">
    ${[['ding','Classic ding'],['pop','Soft pop'],['arcade','Arcade blip'],['off','No sound']].map(([k,label])=>
      `<button class="sitebtn ${cur===k?'sel':''}" data-s="${k}"><span class="sn">${label}</span></button>`).join('')}
  </div>
  <p class="small muted" style="margin-top:14px">Tap to preview &amp; save. Applies on this device.</p>
  </div></div>`;
  $('#back').onclick=renderStaffHome;
  document.querySelectorAll('[data-s]').forEach(b=>b.onclick=()=>{
    const s=b.dataset.s; setSoundStyle(s);
    document.querySelectorAll('[data-s]').forEach(x=>x.classList.remove('sel')); b.classList.add('sel');
    if(s!=='off'){ playSuccess(); buzz(40); }
  });
}

function renderStaffManual(){
  app.innerHTML = `<div class="staffwrap">` + topBar(`<button class="linkbtn" id="back">← Back</button>`) + `
  <div class="card">
    <h3 style="font-size:18px">Find a customer</h3>
    <p class="muted small" style="margin:8px 0 16px">Type the reference shown on their card (e.g. OOB-7F3K9).</p>
    <div class="field"><label class="fl">Reference</label><input id="ref" placeholder="OOB-XXXXX" style="text-transform:uppercase;font-family:var(--display);letter-spacing:2px"></div>
    <div id="err"></div>
    <div style="margin-top:16px"><button class="btn accent" id="go">Look up</button></div>
  </div></div>`;
  $('#back').onclick=renderStaffHome;
  $('#go').onclick=async()=>{
    const ref=$('#ref').value.trim().toUpperCase();
    if(!ref) return;
    lookupAndShow(ref);
  };
  $('#ref').addEventListener('keydown',e=>{if(e.key==='Enter')$('#go').click();});
}

function renderStaffScan(){
  app.innerHTML = `<div class="staffwrap">` + topBar(`<button class="linkbtn" id="back">← Back</button>`) + `
  <div class="card">
    <h3 style="font-size:18px;margin-bottom:6px">Scan customer code</h3>
    <p class="muted small" style="margin-bottom:14px">Point the camera at the QR code on the customer's card.</p>
    <div id="reader" style="border-radius:14px;overflow:hidden"></div>
    <div id="err"></div>
    <div style="margin-top:14px"><button class="btn ghost" id="manual">Enter manually instead</button></div>
  </div></div>`;
  $('#back').onclick=()=>{ stopScanner(); renderStaffHome(); };
  $('#manual').onclick=()=>{ stopScanner(); renderStaffManual(); };
  startScanner();
}
let html5qr=null;
function startScanner(){
  try{
    html5qr=new Html5Qrcode('reader');
    html5qr.start({facingMode:'environment'},{fps:10,qrbox:{width:220,height:220}},
      txt=>{ stopScanner(); lookupAndShow(txt.trim().toUpperCase()); },
      ()=>{}
    ).catch(e=>{ $('#err').innerHTML=`<div class="errmsg">Camera unavailable — use “Enter manually”. (${esc(e.message||'')})</div>`; });
  }catch(e){ $('#err').innerHTML=`<div class="errmsg">Camera not supported here — use manual entry.</div>`; }
}
function stopScanner(){ if(html5qr){ try{html5qr.stop().then(()=>html5qr.clear()).catch(()=>{});}catch(e){} html5qr=null; } }

async function lookupAndShow(ref){
  const {data,error}=await sb.rpc('staff_lookup',{p_pin:STAFF.pin,p_ref:ref});
  if(error){ playFail(); toast('Lookup failed.','err'); return renderStaffHome(); }
  if(!data||!data.length){
    playFail(); buzz([60,40,60]);
    app.innerHTML = `<div class="staffwrap">` + topBar(`<button class="linkbtn" id="back">← Back</button>`) + `
      <div class="card center"><div class="bignum" style="font-size:30px">Not found</div>
      <p class="muted" style="margin-top:10px">No customer with reference <b>${esc(ref)}</b>.</p>
      <div class="btnrow" style="margin-top:16px"><button class="btn accent" id="rescan" style="flex:1">📷 Scan again</button><button class="btn ghost" id="again" style="flex:1">Type it</button></div></div></div>`;
    $('#back').onclick=renderStaffHome; $('#again').onclick=renderStaffManual; $('#rescan').onclick=renderStaffScan; return;
  }
  showCustomerActions(data[0]);
}

function showCustomerActions(c){
  const ready=c.ready;
  app.innerHTML = `<div class="staffwrap">` + topBar(`<button class="linkbtn" id="scannext">📷 Next</button> <button class="linkbtn" id="back">Done</button>`) + `
  <div class="card center">
    <div class="small muted" style="letter-spacing:.5px">CUSTOMER</div>
    <div class="refchip" style="margin:8px auto 0;display:inline-block">${esc(c.ref)}</div>
    <div style="margin:20px 0 6px"><span class="bignum">${c.stamps}</span><span class="muted" style="font-size:22px">/${GOAL}</span></div>
    <div class="small muted">stamps collected</div>
    ${ready?`<div class="ready" style="margin-top:16px"><h3 style="font-size:18px">£25 reward ready</h3></div>`:''}
  </div>
  <div class="card">
    ${!ready?`<button class="btn accent" id="addstamp">＋ Add a stamp</button>`:''}
    ${ready?`<button class="btn" id="redeem">Apply £25 reward</button><button class="btn ghost" id="addstamp">＋ Add a stamp instead</button>`:''}
    <div id="sitewrap" class="hide" style="margin-top:14px">
      <label class="fl">Which site?</label>
      <div class="sitegrid" id="sg">
        ${Object.entries(SITES).map(([k,s])=>`<button class="sitebtn" data-site="${k}">
          <span class="dot" style="background:${s.accent}"><img src="${s.logo}" alt="${esc(s.name)}" onerror="this.style.display='none';this.parentNode.textContent='${s.tag}'"></span>
          <span class="sn">${s.name}</span></button>`).join('')}
      </div>
      <div style="margin-top:14px"><button class="btn accent" id="confirm" disabled>Confirm</button></div>
    </div>
    <div id="err"></div>
  </div>
  ${(window._lastAction && window._lastAction.ref===c.ref && (Date.now()-window._lastAction.at)<60000)?`<div class="card"><button class="btn ghost" id="undo" style="border-color:var(--warn);color:#ffd1d1">↩ Undo last ${window._lastAction.type==='redeem'?'redemption':'stamp'}</button></div>`:''}
  </div>`;
  $('#back').onclick=renderStaffHome;
  if($('#scannext')) $('#scannext').onclick=renderStaffScan;
  if($('#undo')) $('#undo').onclick=async()=>{
    const u=$('#undo'); u.disabled=true; u.innerHTML='<span class="spin"></span>';
    const {data,error}=await sb.rpc('staff_undo',{p_pin:STAFF.pin,p_ref:c.ref});
    if(error){ playFail(); u.disabled=false; u.textContent='↩ Undo'; $('#err').innerHTML=`<div class="errmsg">${esc(friendly(error.message))}</div>`; return; }
    buzz(40); toast('Last action undone','ok'); window._lastAction=null;
    showCustomerActions(data[0]);
  };
  let action=null, site=STAFF.site||null;
  const openSite=(act)=>{ action=act;
    $('#sitewrap').classList.remove('hide');
    $('#confirm').textContent= act==='redeem'?'Confirm £25 redemption':'Confirm stamp';
    // If this is a per-site staff PIN, pre-select their site automatically.
    if(STAFF.site && SITES[STAFF.site]){
      site=STAFF.site;
      $('#sg').querySelectorAll('.sitebtn').forEach(x=>{ x.classList.toggle('sel', x.dataset.site===STAFF.site); });
      setAccent(STAFF.site); $('#confirm').disabled=false;
    }
  };
  if($('#addstamp')) $('#addstamp').onclick=()=>openSite('stamp');
  if($('#redeem')) $('#redeem').onclick=()=>openSite('redeem');
  $('#sg')&&$('#sg').querySelectorAll('.sitebtn').forEach(b=>b.onclick=()=>{
    $('#sg').querySelectorAll('.sitebtn').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel'); site=b.dataset.site; setAccent(site); $('#confirm').disabled=false;
  });
  if($('#confirm')) $('#confirm').onclick=async()=>{
    if(!site) return;
    const btn=$('#confirm'); btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
    if(action==='stamp'){
      const {data,error}=await sb.rpc('staff_add_stamp',{p_pin:STAFF.pin,p_ref:c.ref,p_site:site,p_staff:STAFF.name});
      if(error){ playFail(); buzz([60,40,60]); btn.disabled=false; btn.textContent='Confirm stamp'; $('#err').innerHTML=`<div class="errmsg">${esc(friendly(error.message))}</div>`; return; }
      const updated=data[0];
      if(updated.ready){
        // they just hit 6!
        playCelebrate(); buzz([0,80,40,80,40,120]); confetti(); flash('reward','£25 UNLOCKED! 🎉');
      }else{
        playSuccess(); buzz(60); flash('ok','STAMP ADDED ★');
      }
      window._lastAction={type:'stamp',ref:c.ref,site:site,at:Date.now()};
      setTimeout(()=>showCustomerActions(updated),900);
    }else{
      const {error}=await sb.rpc('staff_redeem',{p_pin:STAFF.pin,p_ref:c.ref,p_site:site,p_staff:STAFF.name});
      if(error){ playFail(); buzz([60,40,60]); btn.disabled=false; btn.textContent='Confirm £25 redemption'; $('#err').innerHTML=`<div class="errmsg">${esc(friendly(error.message))}</div>`; return; }
      playCelebrate(); buzz([0,80,40,120]); confetti(); flash('reward','£25 REDEEMED 🎉');
      window._lastAction={type:'redeem',ref:c.ref,site:site,at:Date.now()};
      const {data}=await sb.rpc('staff_lookup',{p_pin:STAFF.pin,p_ref:c.ref});
      setTimeout(()=>showCustomerActions(data[0]),900);
    }
  };
}
function friendly(m){
  if(/CARD_FULL/.test(m)) return 'Card already full — apply the £25 reward instead.';
  if(/NOT_READY/.test(m)) return 'Not enough stamps to redeem yet.';
  if(/NO_CUSTOMER/.test(m)) return 'Customer not found.';
  if(/INVALID_PIN/.test(m)) return 'Session expired — please lock and sign in again.';
  return m;
}

function renderStaffNewCustomer(){
  app.innerHTML = `<div class="staffwrap">` + topBar(`<button class="linkbtn" id="back">← Back</button>`) + `
  <div class="card">
    <h3 style="font-size:18px">Add a new customer</h3>
    <p class="muted small" style="margin:8px 0 16px">Creates a card on the spot. They can claim the account later with their email.</p>
    <div class="field"><label class="fl">Name</label><input id="nm" placeholder="Customer name"></div>
    <div class="field"><label class="fl">Email</label><input id="em" type="email" placeholder="customer@email.com"></div>
    <div id="err"></div>
    <div style="margin-top:16px"><button class="btn accent" id="go">Create card</button></div>
  </div></div>`;
  $('#back').onclick=renderStaffHome;
  $('#go').onclick=async()=>{
    const nm=$('#nm').value.trim(), em=$('#em').value.trim();
    if(!nm||!em) return $('#err').innerHTML=`<div class="errmsg">Enter a name and email.</div>`;
    const btn=$('#go'); btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
    const {data,error}=await sb.rpc('staff_add_customer',{p_pin:STAFF.pin,p_name:nm,p_email:em});
    if(error){ btn.disabled=false; btn.textContent='Create card'; return $('#err').innerHTML=`<div class="errmsg">${esc(friendly(error.message))}</div>`; }
    const ref=data[0].ref;
    app.innerHTML = `<div class="staffwrap">` + topBar(`<button class="linkbtn" id="back">← Done</button>`) + `
      <div class="card center"><div class="small muted" style="letter-spacing:.5px">CARD CREATED</div>
      <div class="refchip" style="margin:14px auto;display:inline-block;font-size:28px">${esc(ref)}</div>
      <p class="muted small">Give this reference to the customer. They can add a stamp now, or sign up online with their email to see it on their phone.</p>
      <div style="margin-top:16px"><button class="btn accent" id="stamp">Add their first stamp</button></div></div></div>`;
    $('#back').onclick=renderStaffHome;
    $('#stamp').onclick=()=>lookupAndShow(ref);
  };
}

/* go */
boot();
</script>
